name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python
        run: python -m compileall -q tools tests experiments templates
      - name: Test repository tools
        run: python -m unittest discover -s tests -v
      - name: Test reference experiment
        run: python -m unittest discover -s experiments/000-hello-lab/tests -v
      - name: Test light protocol compiler
        run: python -m unittest discover -s experiments/001-light-protocol-compiler/tests -v
